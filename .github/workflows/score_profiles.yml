name: AuditorSEC - Score Profiles

on:
  push:
    paths:
      - 'profiles/**'
      - 'schema/**'
      - 'scoring/**'
  workflow_dispatch:

jobs:
  score:
    name: Score all profiles
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run AuditorSEC scoring engine
        run: python scoring/scorer.py

      - name: Show scored results
        run: |
          echo "=== Scored JSON files ==="
          find profiles -name "*.scored.json" -print -exec cat {} \;

      - name: Commit scored results
        run: |
          git config user.name "AuditorSEC Bot"
          git config user.email "bot@auditor-sec.ua"
          git add profiles/**/*.scored.json || true
          git diff --cached --quiet || git commit -m "chore: auto-scored profiles [skip ci]"
          git push || true
