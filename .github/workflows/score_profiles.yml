name: AuditorSEC - Score Profiles

on:
  push:
    paths:
      - 'profiles/**'
      - 'schema/**'
      - 'scoring/**'
  workflow_dispatch:

jobs:
  score:
    name: Score all profiles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run AuditorSEC scoring engine
        run: python scoring/scorer.py

      - name: Display scored results
        run: |
          echo "========================================"
          echo "  AuditorSEC Scoring Results"
          echo "========================================"
          find profiles -name "*.scored.json" | sort | while read f; do
            echo ""
            echo "--- $f ---"
            python3 -c "
import json, sys
with open('$f') as fh:
    d = json.load(fh)
print(f\"Name: {d.get('name', 'N/A')}\")
print(f\"Type: {d.get('type', 'N/A')}\")
o = d.get('output', {})
print(f\"Score: {o.get('weighted_score', 'N/A')}/5.00\")
for k,v in o.items():
    if k != 'weighted_score':
        print(f\"  {k}: {v}\")
"
          done
          echo ""
          echo "========================================"
